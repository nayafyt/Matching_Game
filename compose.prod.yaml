services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-https://example.com}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      target: prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
